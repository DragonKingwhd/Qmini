agent:
  seed: 42
  device: cuda:0
  num_steps_per_env: 24
  max_iterations: 5000
  empirical_normalization: false
  policy:
    class_name: ActorCritic
    init_noise_std: 0.8
    noise_std_type: scalar
    actor_hidden_dims:
    - 512
    - 256
    critic_hidden_dims:
    - 512
    - 256
    activation: relu
  algorithm:
    class_name: PPO
    num_learning_epochs: 3
    num_mini_batches: 4
    learning_rate: 0.001
    schedule: adaptive
    gamma: 0.995
    lam: 0.95
    entropy_coef: 0.0005
    desired_kl: 0.01
    max_grad_norm: 1.0
    value_loss_coef: 1.0
    use_clipped_value_loss: true
    clip_param: 0.2
    normalize_advantage_per_mini_batch: false
    symmetry_cfg: null
    rnd_cfg: null
  clip_actions: null
  save_interval: 200
  experiment_name: qmini_birl
  run_name: ''
  logger: tensorboard
  neptune_project: isaaclab
  wandb_project: isaaclab
  resume: false
  load_run: .*
  load_checkpoint: model_.*.pt
