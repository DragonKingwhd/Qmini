# Per-robot calibration. Fill in after running on-site IMU calibration.

imu:
  # Mean gyro reading (rad/s) when robot is stationary on flat ground.
  # Length 3, [wx, wy, wz] in body frame.
  gyro_bias: null            # e.g. [0.001, -0.002, 0.000]

# Optional: per-joint encoder zero offset (rad), if your motor zero != URDF zero.
# Length must be 10, ordered like deploy.constants.JOINT_NAMES.
joints:
  offset: null
